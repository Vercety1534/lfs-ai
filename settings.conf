###############################################################################
#                                  WARNING                                    #
#                                                                             #
#               This configuration controls disk partitioning.                #
#                Incorrect values can destroy existing data.                  #
#                                                                             #
#                        Edit settings after reboot!                          #
#                Drives don't always load in the same order.                  #
#                                                                             #
#                           Verify the drive with:                            #
#                                   lsblk                                     #
#                                                                             #
###############################################################################

###############################################################################
#                          USER SETTINGS (EDIT THIS)                          #
###############################################################################

# Target disk for the LFS installation
# Must not be left as placeholders
# Examples:
#      /dev/sda
#      /dev/vda
#      /dev/nvme0n1
#      /dev/mmcblk0
DRIVE="/dev/REPLACE_ME"

# Size values use K, M, G, or T suffixes
# Examples: 512M, 2G, 64G

#  EFI partition size (minimum 512M)
EFI_SIZE="2G"

#  Swap partition size (minimum 1G)
SWAP_SIZE="32G"

# Mount location for the LFS system
LFS="/mnt/lfs"

# Passwords used during build
# Must not be left as placeholders
LFS_PASS="REPLACE_ME"
ROOT_PASS="REPLACE_ME"

###############################################################################
#                           COMPILER OPTIMIZATIONS                            #
###############################################################################

## -march=native is generally fine if the final system is meant for this machine
## Only modify if you understand CPU flags

ADD_CFLAGS="-march=native -O2 -pipe"
#ADD_CFLAGS="-march=raptorlake -mtune=raptorlake -O2 -pipe"
